# Template values for userchart.  DO NOT Edit.  Instead, make a copy and edit the copy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

########### 必须要写的部分 ###########
NameSpace: s0837   # 自己的namespace （同用户名）
BaseName: pytorch   # 任务的基本名字，建议写任务描述，例如pytorch
ContainerImage: harbor.xa.xshixun.com:7443/llm-course/lab:v2   # 镜像名称，默认为 harbor.xa.xshixun.com:7443/xuw/pytorch:v1.5，或者见README的说明
GPU: stuff-H200 # 目前只有这一个选项

########### 选填的部分 ###########
# DeployName: namespace-pytorch-release     # 任务（deployment）的名字，默认为`NameSpace-BaseName-ReleaseName`， releaseName为随机生成的字符串是在helm命令行里指定的
# Label: pytorch-release              # 任务的标签，默认为`BaseName-ReleaseName`
# ContainerName: pytorch-release      # 容器名，默认为`BaseName-ReleaseName`
# NVMEStorage: 100G                   # 申请的本地盘/scratch的大小，不填即为默认值
Limits:             # 申请的资源，注意所有启动的资源总和不能超过自己ns的quota，如果增加quota，需要向管理员申请，不填为默认值
#  CPU: 8
#  memory: 16Gi
  GPU: 1
    #UseShm: False
UseShm: True
ShmSize: 16Gi

# 使用 GPU EGL 渲染加速
# UseEGL: true

# Replicas: 1     # starting more replica of the pod (for distributed training)

# 额外挂载模型/数据 PVC（需事先在 namespace 下创建对应 PVC）
# ModelsDataPVC:
#   enabled: true
#   claimName: ""                      # 留空则使用 pvc-models-data-<NameSpace>
#   mountPath: /data                   # Pod 内挂载路径，默认 /data
#   readOnly: false

########### 共享数据挂载 ###########
# 额外挂载公共模型权重目录，默认关闭；需要读取公共模型时改为 enabled: true
# 开启后容器内路径为 /data/share/models，例如：
#   /data/share/models/GLM-4.7-FP8-dynamic
SharedModels:
  enabled: false
  hostPath: /mnt/gpfs2/hqzy-mg3226/share/public/models
  mountPath: /data/share/models

